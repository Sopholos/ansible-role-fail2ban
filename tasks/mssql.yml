---
- name: Configure MSSQL filter
  template:
    src: filter.mssql.conf.j2
    dest: "/etc/fail2ban/filter.d/{{ fail2ban_mssql_filter_name }}.conf"
  notify: restart fail2ban

- name: Configure MSSQL jail
  template:
    src: jail.mssql.local.j2
    dest: /etc/fail2ban/jail.d/mssql.local
  notify: restart fail2ban
